<!-- index.html -->
<!DOCTYPE html>  
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskly To-Do List</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="icon" href="icon-192.png">
</head>  
<body>  
    <div id="layoutBox">  

        <div class="div" id="div1">
            <img src="logo.png" alt="" id="logoImg">
        </div> 
  
        <div class="div">
            <h1 id="Taskly">Taskly</h1>
        </div>

        <div class="div">
            <h2 id="heading2">
                Your simple To-Do List
                <br>
                to stay organised.
            </h2>  
        </div>
        <div id="pngDiv">
               <img src="1781173102564.png" id="png">
        </div>
        <div>
            <h3 id="enterName">Enter your name</h3>
        </div> 
        
        <p id="errorPara">⛔Name must have more than 2 characters</p>
        
        <div class="div">
            <input type="text" id="name" placeholder="Enter your name">
        </div>
        <br>
        <div class="div">
            <button id="registerBtn">Continue</button>
        </div>
        <div id="madeBy">
          &#9760;  Made by Nirmal Programmer  &#9760;
        </div> 
 
    </div>  
    
    <script src="script.js"></script>
</body>
</html>
