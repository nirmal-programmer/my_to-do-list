<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width,  initial-scale=1.0">
    <title>Taskly To-Do List</title>
    <link rel="stylesheet" href="page2.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
</head>  
<body> 
    <div id="navbar">
            <div id="logo">  
            ✓
            </div>
 
            <h1 id="Taskly">Taskly</h1>
    </div>
  
    <h2 id="welcome" class="allEl"></h2>

    <p class="allEl" id="line1">Lets get things done today.</p>

    <div id="addTasks">
        <input type="text" placeholder="Add a new task..." class="allEl" id="addTaskBar">
        <button id="addTaskBtn">
            Add +
        </button>
    </div> 
    
    <div id="progressStatusParentDiv">
        <div id="progressStatusChildDiv">
            <div id="persentageDiv">
                <h3 id="yourProgress">Your Progress</h3>
                <p id="persentage"></p>
            </div> 
           
            <div id="progressDivBgDiv">
                <div id="progressDiv">
                    <div id="progressLine">

                    </div>
                </div>
            </div>
            
            <p id="completedTaskLine"></p>
        </div>
    </div> 
    
    <div id="yourTaskDiv">   
        <h3 class="allEl">Your tasks</h3>
        
        <div id="filterBtnDiv">
            <button class="taskFilterBtn" id="allBtn">All</button>
            <button class="taskFilterBtn">Pending</button> 
            <button class="taskFilterBtn">Completed</button>
        </div>  
         
    </div>  
    <div id="tasksDiv">   
        <!-- <div id="task">
            <label for="Workout" id="taskLabel">
                <input type="checkbox" value="Workout" name=task id="taskCheckbox">
                     Workout
            </label>
            <button id="deleteBtn">
                <i class="material-icons" style="font: size 15px;color:red">delete</i>
            </button>
            
        </div> --> 
    </div>
    
    <script src="page2.js"></script>
</body>
</html>
